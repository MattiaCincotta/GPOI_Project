    # HTTP → HTTPS redirect
server {
    listen 80;
    server_name ddlsupermercati.it www.ddlsupermercati.it;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name ddlsupermercati.it www.ddlsupermercati.it;

    ssl_certificate     /etc/nginx/ssl/certs/www.ddlsupermercati.it.crt;
    ssl_certificate_key /etc/nginx/ssl/private/www.ddlsupermercati.it.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://gpoi-project:80;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (se necessario)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

